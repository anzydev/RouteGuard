kind = "web"
previewPath = "/"
title = "Transit"
version = "1.0.0"
id = "artifacts/transit"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21657

[services.development]
run = "pnpm --filter @workspace/transit run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/transit", "run", "build" ]
publicDir = "artifacts/transit/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21657"
BASE_PATH = "/"
